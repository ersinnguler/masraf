<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ersin | Masraf Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: sans-serif; }
        .card { background: #1e293b; border: 1px solid #334155; }
        input, select { background: #0f172a !important; color: white !important; border: 1px solid #334155 !important; }
        .accent { background: #22d3ee; color: #0f172a; }
    </style>
</head>
<body class="p-5 md:p-10">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-2xl font-bold mb-6 text-slate-400">MASRAF <span class="text-cyan-400 font-black">SİSTEMİ</span></h1>
        
        <div class="card p-6 rounded-xl shadow-lg mb-6">
            <div class="space-y-4">
                <input type="text" id="desc" placeholder="Harcama Adı" class="w-full p-3 rounded-lg outline-none focus:border-cyan-500">
                <div class="grid grid-cols-2 gap-4">
                    <select id="cat" class="p-3 rounded-lg">
                        <option>Ofis</option>
                        <option>Yazılım</option>
                        <option>Ulaşım</option>
                        <option>Kişisel</option>
                    </select>
                    <input type="number" id="amount" placeholder="Tutar (₺)" class="p-3 rounded-lg outline-none">
                </div>
                <button onclick="saveItem()" class="accent w-full py-3 rounded-xl font-bold uppercase tracking-widest shadow-lg active:scale-95 transition">
                    ENVANTERE İŞLE
                </button>
            </div>
        </div>

        <div class="flex justify-between items-center mb-4 px-2">
            <span class="text-xs uppercase text-slate-500 font-bold">Son İşlemler</span>
            <span id="total" class="text-xl font-black text-cyan-400">0.00 ₺</span>
        </div>
        
        <div id="list" class="space-y-3">
            </div>

        <button onclick="resetData()" class="w-full mt-10 text-[10px] text-slate-600 hover:text-red-500 uppercase tracking-tighter">
            Verileri Tamamen Sıfırla
        </button>
    </div>

    <script>
        // Veriyi çek veya boş dizi oluştur
        let db = JSON.parse(localStorage.getItem('ersin_db')) || [];

        function render() {
            const container = document.getElementById('list');
            const totalEl = document.getElementById('total');
            let sum = 0;
            container.innerHTML = "";

            db.forEach((item, index) => {
                sum += parseFloat(item.amount);
                container.innerHTML += `
                    <div class="card p-4 rounded-lg flex justify-between items-center border-l-4 border-l-cyan-500">
                        <div>
                            <div class="font-bold text-slate-200">${item.desc}</div>
                            <div class="text-[10px] text-slate-500 uppercase">${item.date} | ${item.cat}</div>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="font-bold text-cyan-400">${parseFloat(item.amount).toFixed(2)} ₺</span>
                            <button onclick="removeItem(${index})" class="text-slate-700 hover:text-red-500"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });
            totalEl.innerText = sum.toFixed(2) + " ₺";
        }
